    <!-- Навигация -->

<p>test</p>

    <!-- Основной контент -->

            <p>Телефон/WhatsApp/Telegram +7(921)585-00-89     Instagram/Vk - @foilrent</p>

    </footer>    

    <!-- Скрипты -->
    <script>
        const burgerMenu = document.getElementById('burger-menu');
        const menuOverlay = document.getElementById('menu-overlay');
        const tintOverlay = document.getElementById('tint-overlay');
        const menu = document.getElementById('menu');
        const extraText = document.getElementById('extra-text');
        const expandLink = document.querySelector('.expand-link');

        function toggleDescription() {
            extraText.classList.toggle('show');
            expandLink.style.display = 'none';
        }

        function toggleMenu() {
            document.body.classList.toggle('open');
            menuOverlay.style.display = menuOverlay.style.display === 'block' ? 'none' : 'block';
        }

        function closeMenu(event) {
            if (!menu.contains(event.target) && !burgerMenu.contains(event.target)) {
                document.body.classList.remove('open');
                menuOverlay.style.display = 'none';
            }
        }

        function togglePrices() {
            const priceTable = document.getElementById('priceTable');
            priceTable.style.display = priceTable.style.display === 'none' || priceTable.style.display === '' ? 'block' : 'none';
        }

        burgerMenu.addEventListener('click', toggleMenu);
        document.addEventListener('click', closeMenu);
    </script>
</body>
</html>
